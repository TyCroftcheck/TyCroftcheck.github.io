<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Final</title>
    <link rel="stylesheet" href="WF.css">
</head>
<body>
    <h1>Bad Volume Control</h1>
    <p>Shift to first to start</p>

    <div class="display">
        <p id="volume">Volume: 0</p>
        <p id="value">0</p>
        <p id="gear">Current Gear: N</p>
    </div>

    <button id="setVolume">Set Volume</button>
    <button id="reset">Reset</button>

    <div class="controls">
        <button id="clutch">
            <img src="assets/Clutch.png" alt="Clutch Pedal">
            <p>Clutch (a)</p>
        </button>

        <button id="brake">
            <img src="assets/Brake.png" alt="Brake Pedal">
                <p>Brake (s)</p>
        </button>


         <button id="gas">
           <img src="assets/Gas.png" alt="Gas Pedal">
            <p>Gas (w)</p>
        </button>

    
        <div class="shiftButton">
            <button id="shiftUp">Shift Up (e)</button>
            <button id="shiftDown">Shift Down (q)</button>
        </div>
    </div>

<div class='transmission'>

    <img id="shifter" src="assets/shifter.png" alt="Shifter">
</div>

<script src="WF.js"></script>

</body>
</html>
