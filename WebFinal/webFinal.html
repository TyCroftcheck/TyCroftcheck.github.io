<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Final</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        p {
            font-size: 24px;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }

        #value {
            font-size: 48px;
            margin: 20px 0;
        }
        #gear {
            font-size: 24px;
            margin-top: 20px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        button:active {
            background-color: #3e8e41;
        }

        #gas {
            background-color: #008CBA;
        }

        #gas:hover {
            background-color: #007bb5;
        }

        #gas:active {
            background-color: #006494;
        }

        #shiftUp, #shiftDown {
            background-color: #f44336;
        }

        #shiftUp:hover, #shiftDown:hover {
            background-color: #d32f2f;
        }

        #shiftUp:active, #shiftDown:active {
            background-color: #b71c1c;
        }

        #reset {
            background-color: #e7e7e7;
            color: black;
        }

        #reset:hover {
            background-color: #d6d6d6;
        }
        #reset:active {
            background-color: #c0c0c0;
        }
    </style>
</head>
<body>
    <p>Web Final</p>
    
    <button id="gas">Hold to Accelerate</button>
    <p id="value">0</p>
    <p id="volume">Volume: 0</p>
    <button id="setVolume">Set Volume</button>

    <div class="shiftButton">
         <button id="shiftUp">Shift Up</button>
         <button id="shiftDown">Shift Down</button>
    </div>

    <p id="gear">Current Gear: N</p>

    <button id="reset">Reset</button>



    <script>
        let value = 0;
        let upInterval = null;
        let downInterval = null;
        let gear = 0;

        const button = document.getElementById('gas');
        const display = document.getElementById('value');

        const volumeDisplay = document.getElementById('volume');
        const setVolumeButton = document.getElementById('setVolume');

         setVolumeButton.addEventListener('click', () => {
            volumeDisplay.textContent = `Volume: ${value}`;
        });

        function updateDisplay() {
            display.textContent = value;
        }

        button.addEventListener('mousedown', () => {
            clearInterval(upInterval);
            clearInterval(downInterval);

            upInterval = setInterval(() => {
            let max = gear * 20;
             if (gear > 0 && value < max) {
                    value++;
                }
                updateDisplay();
            }, 100);
        });

        button.addEventListener('mouseup', () => {
            clearInterval(upInterval);
            clearInterval(downInterval);

                downInterval = setInterval(() => {
                  let min;
                  if (gear === 0){
                    min = 0;
                  } else if (gear === 1){
                    min = 1;
                  } else {
                    min = (gear - 1) * 20;
                  }

                  if (value > min) {
                    value--;
                    updateDisplay();
                } else {
                    clearInterval(downInterval);
                } 
            }, 300);
        });

        button.addEventListener('mouseleave', () => {
            clearInterval(upInterval);
            clearInterval(downInterval);

            downInterval = setInterval(() => {
                  let min;
                  if (gear === 0){
                    min = 0;
                  } else if (gear === 1){
                    min = 1;
                  } else {
                    min = (gear - 1) * 20;
                  }

                  if (value > min) {
                    value--;
                    updateDisplay();
                } else {
                    clearInterval(downInterval);
                } 
            }, 300);
        }); 

        document.getElementById('shiftUp').addEventListener('click', () => {
            let max = gear * 20;
            if (gear === 0) {
                gear = 1;
            } else if (gear < 5 && value >= max - 5) {
                gear++;
            }

            if (gear === 0) {
                document.getElementById('gear').textContent = `Current Gear: N`;
            } else {
                document.getElementById('gear').textContent = `Current Gear: ${gear}`;
            }
        });

           document.getElementById('reset').addEventListener('click', () => {
            clearInterval(upInterval);
            clearInterval(downInterval);
            value = 0;
            gear = 0;
            updateDisplay();
            document.getElementById('gear').textContent = `Current Gear: ${gear}`;
        });

        document.getElementById('shiftDown').addEventListener('click', () => {
            if (gear > 0) {
                gear--;
                document.getElementById('gear').textContent = `Current Gear: ${gear}`;
            }
            if (gear === 0) {
                document.getElementById('gear').textContent = `Current Gear: N`;
            } else {
                document.getElementById('gear').textContent = `Current Gear: ${gear}`;
            }
        });


    </script>
</body>
</html>
